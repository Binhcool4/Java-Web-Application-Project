<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial,sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .container {
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            width:100%;
            max-width:450px;
        }
        .logo { text-align:center; margin-bottom:25px; }
        .logo h1 { color:#0275d8; }

        .form-group { margin-bottom:15px; }
        input {
            width:100%;
            padding:10px;
            border:1px solid #ddd;
            border-radius:5px;
        }
        .btn {
            width:100%;
            padding:12px;
            background:#0275d8;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        .btn:hover { background:#025aa5; }

        .error-message {
            background:#f8d7da;
            padding:10px;
            margin-bottom:15px;
            border-radius:5px;
            color:#721c24;
        }

        .footer { text-align:center; margin-top:15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>Cinema</h1>
        <p>Tạo tài khoản</p>
    </div>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <!-- NAME -->
        <div class="form-group">
            <label>Họ và tên:</label>
            <input type="text"
                   th:field="*{name}"
                   placeholder="Nhập họ tên">

            <p style="color:red;font-size:12px"
               th:errors="*{name}"></p>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
            <label>Email:</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="Nhập email">

            <p style="color:red;font-size:12px"
               th:errors="*{email}"></p>
        </div>

        <!-- PASSWORD -->
        <div class="form-row">

            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password"
                       th:field="*{password}"
                       placeholder="Nhập mật khẩu">

                <p style="color:red;font-size:12px"
                   th:errors="*{password}"></p>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu:</label>
                <input type="password"
                       name="confirmPassword"
                       placeholder="Nhập lại mật khẩu">
            </div>

        </div>

        <!-- PHONE -->
        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="text"
                   th:field="*{phone}"
                   placeholder="Nhập số điện thoại">

            <p style="color:red;font-size:12px"
               th:errors="*{phone}"></p>
        </div>

        <!-- ADDRESS -->
        <div class="form-group">
            <label>Địa chỉ:</label>
            <input type="text"
                   th:field="*{address}"
                   placeholder="Nhập địa chỉ">

            <p style="color:red;font-size:12px"
               th:errors="*{address}"></p>
        </div>

        <!-- GLOBAL ERROR -->
        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <button type="submit" class="btn">
            Đăng ký
        </button>

    </form>

    <div class="footer">
        <p>Đã có tài khoản?</p>
        <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>

</body>
</html>
