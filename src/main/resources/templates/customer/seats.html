<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chon ghe - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
    <style>
        .seat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 10px; }
        .seat-box { min-height: 48px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="/">Cinema System</a>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-2" th:text="${showtime.movie.title}">Tên phim</h3>
<!--    <p class="text-muted">-->
<!--        Suất chiếu:-->
<!--        <b th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')}"></b>-->
<!--        |-->
<!--        Phòng: <b th:text="${showtime.room.name}"></b>-->
<!--    </p>-->
        <p class="text-muted">
            Suất chiếu:
            <b th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')}"></b>
            |
            Phòng: <b th:text="${showtime.room.name}"></b>
            |
            Giá vé: <span class="badge bg-success" th:text="${#numbers.formatInteger(showtime.price, 0) + ' VND'}"></span>
        </p>

    <div th:if="${msgError}" class="alert alert-danger" th:text="${msgError}"></div>

    <form th:action="@{/booking/create}" method="post">
        <input type="hidden" name="showtimeId" th:value="${showtime.id}">

        <div class="alert alert-secondary text-center">MÀN HÌNH</div>

        <div class="seat-grid mb-4">
            <label th:each="seat : ${seats}"
                   th:class="${#lists.contains(bookedSeatIds, seat.id) ? 'btn btn-outline-secondary disabled seat-box' : 'btn btn-outline-primary seat-box'}">
                <input class="btn-check"
                       type="checkbox"
                       name="seatIds"
                       th:value="${seat.id}"
                       th:disabled="${#lists.contains(bookedSeatIds, seat.id)}">
                <span th:text="${seat.seatName}">A1</span>
                <small th:if="${#lists.contains(bookedSeatIds, seat.id)}" class="d-block">Đã đặt</small>
            </label>
        </div>

        <button type="submit" class="btn btn-success">Xác nhận đặt vé</button>
        <a th:href="@{/movie/{id}/showtimes(id=${showtime.movie.id})}" class="btn btn-secondary">Quay lại</a>
    </form>
</div>
</body>
</html>
