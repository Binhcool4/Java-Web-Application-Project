<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .container {
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            width:100%;
            max-width:400px;
        }
        .logo { text-align:center; margin-bottom:25px; }
        .logo h1 { color:#0275d8; }

        .form-group { margin-bottom:20px; }
        input {
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:5px;
        }
        .btn {
            width:100%;
            padding:12px;
            background:#0275d8;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        .btn:hover { background:#025aa5; }

        .error-message {
            background:#f8d7da;
            padding:10px;
            margin-bottom:15px;
            border-radius:5px;
            color:#721c24;
        }

        .success-message {
            background:#d4edda;
            padding:10px;
            margin-bottom:15px;
            border-radius:5px;
            color:#155724;
        }

        .footer { text-align:center; margin-top:15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>Cinema</h1>
        <p>Đăng nhập</p>
    </div>

    <div th:if="${param.success}" class="success-message">
        Đăng ký thành công!
    </div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <input type="email" name="email" placeholder="Email">
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Mật khẩu">
        </div>

        <button type="submit" class="btn">Đăng nhập</button>
    </form>
    <br>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <div class="footer">
        <p>Chưa có tài khoản?</p>
        <a th:href="@{/register}">Đăng ký</a>
    </div>
</div>

</body>
</html>
